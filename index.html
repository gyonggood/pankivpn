<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panki VPN</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --red: #ff0000;
            --blue: #0044ff;
            --bg: #000;
            --text: #fff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* Сканирующие линии */
        body::before {
            content: " ";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            z-index: 100;
            pointer-events: none;
        }

        .header {
            padding: 20px;
            border-bottom: 2px solid var(--text);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.5rem;
            margin: 0;
            letter-spacing: -1px;
            position: relative;
        }

        .settings-btn {
            background: var(--text);
            color: var(--bg);
            border: none;
            padding: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .content {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .terminal-box {
            border: 2px solid var(--text);
            padding: 30px 15px;
            position: relative;
        }

        .terminal-box::before {
            content: "[ INPUT_REQUIRED ]";
            position: absolute;
            top: -10px; left: 15px;
            background: var(--bg);
            padding: 0 5px;
            font-size: 0.7rem;
            color: var(--red);
        }

        .input-label {
            display: block;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        input[type="text"] {
            width: 100%;
            background: transparent;
            border: 1px solid var(--text);
            padding: 15px;
            color: var(--red);
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            outline: none;
            text-align: center;
        }

        input[type="text"]:focus {
            border-color: var(--red);
            box-shadow: 0 0 10px var(--red);
        }

        .footer { padding: 20px; }

        .btn-main {
            width: 100%;
            padding: 20px;
            background: var(--text);
            color: var(--bg);
            border: none;
            font-size: 1.2rem;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: -6px 6px 0px var(--red);
            transition: 0.1s;
        }

        .btn-main:active {
            transform: translate(-3px, 3px);
            box-shadow: -2px 2px 0px var(--blue);
        }

        /* Меню (Шторка) */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.1);
            backdrop-filter: blur(5px);
            display: none;
            z-index: 200;
        }

        .sheet {
            position: fixed;
            bottom: -100%;
            left: 0; width: 100%;
            background: var(--bg);
            border-top: 4px solid var(--text);
            padding: 30px 20px;
            transition: 0.3s;
            z-index: 300;
        }

        .sheet.active { bottom: 0; }

        .menu-item {
            border: 1px solid var(--text);
            padding: 15px;
            margin-bottom: 10px;
            text-align: center;
            font-weight: bold;
        }

        .menu-item:active { background: var(--red); color: #fff; }

    </style>
</head>
<body>

    <div class="header">
        <h1 id="app-title">PANKIVPN</h1>
        <button class="settings-btn" onclick="toggleSheet(true)">[ OPTS ]</button>
    </div>

    <div class="content">
        <div class="terminal-box">
            <label class="input-label" id="label-text">Введите свой ключ</label>
            <input type="text" id="vpnKey" placeholder="XXXX-XXXX-XXXX">
        </div>
    </div>

    <div class="footer">
        <button class="btn-main" id="buy-btn" onclick="handleBuy()">КУПИТЬ ДОСТУП</button>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSheet(false)"></div>
    <div class="sheet" id="sheet">
        <div class="menu-item" onclick="setLanguage('ru')">RU // РУССКИЙ</div>
        <div class="menu-item" onclick="setLanguage('en')">EN // ENGLISH</div>
        <div class="menu-item" onclick="openSupport()" style="border-color: var(--red); color: var(--red);">[ SUPPORT_BOT ]</div>
        <div class="menu-item" onclick="toggleSheet(false)" style="margin-top: 20px; opacity: 0.5;">BACK</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#000000');

        const translations = {
            ru: { label: "Введите свой ключ", buy: "КУПИТЬ ДОСТУП", confirm: "Инициализировать оплату?" },
            en: { label: "Enter access key", buy: "BUY ACCESS", confirm: "Initialize payment?" }
        };

        let currentLang = 'ru';

        function setLanguage(lang) {
            currentLang = lang;
            document.getElementById('label-text').innerText = translations[lang].label;
            document.getElementById('buy-btn').innerText = translations[lang].buy;
            toggleSheet(false);
            tg.HapticFeedback.impactOccurred('heavy');
        }

        function toggleSheet(show) {
            document.getElementById('sheet').classList.toggle('active', show);
            document.getElementById('overlay').style.display = show ? 'block' : 'none';
        }

        function openSupport() {
            tg.openTelegramLink("https://t.me/pankivpnsupportbot");
        }

        function handleBuy() {

            document.body.style.filter = "invert(1)";
            setTimeout(() => document.body.style.filter = "none", 100);
            
            tg.HapticFeedback.notificationOccurred('success');
            tg.showConfirm(translations[currentLang].confirm);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panki VPN - X Style</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Цвета в стиле X (Twitter) */
        :root {
            --black: #000000;
            --white: #ffffff;
            --x-blue: #1d9bf0;
            --dark-gray: #16181c;
            --light-gray: #71767b;
            --border-color: #2f3336;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--black);
            color: var(--white);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Шапка */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .brand {
            font-size: 20px;
            font-weight: 800;
        }

        .settings-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--white);
            padding: 8px;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .settings-btn:active {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Главный контент */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .input-group {
            width: 100%;
            max-width: 350px;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background-color: var(--black);
            color: var(--white);
            font-size: 18px;
            outline: none;
            text-align: center;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--x-blue);
        }

        .hint {
            color: var(--light-gray);
            font-size: 14px;
            margin-top: 8px;
            text-align: center;
        }

        /* Подвал */
        .footer {
            padding: 16px;
            border-top: 1px solid var(--border-color);
        }

        .buy-button {
            width: 100%;
            padding: 12px;
            border-radius: 9999px; /* Скругленные кнопки как в X */
            border: none;
            background-color: var(--white);
            color: var(--black);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        /* Модальное окно настроек */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(91, 112, 131, 0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal {
            background: var(--black);
            width: 90%;
            max-width: 320px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            padding: 20px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 20px;
            text-align: center;
        }

        .setting-item {
            margin-bottom: 20px;
        }

        .setting-label {
            color: var(--light-gray);
            font-size: 13px;
            margin-bottom: 8px;
            display: block;
        }

        .lang-select {
            width: 100%;
            background: var(--dark-gray);
            color: var(--white);
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 8px;
            font-size: 16px;
        }

        .support-btn {
            width: 100%;
            background: transparent;
            color: var(--x-blue);
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 9999px;
            font-weight: 700;
            margin-top: 10px;
            cursor: pointer;
        }

        .close-modal {
            width: 100%;
            margin-top: 15px;
            color: var(--light-gray);
            background: none;
            border: none;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand">Panki VPN</div>
        <button class="settings-btn" onclick="toggleModal(true)">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 15.5C13.93 15.5 15.5 13.93 15.5 12C15.5 10.07 13.93 8.5 12 8.5C10.07 8.5 8.5 10.07 8.5 12C8.5 13.93 10.07 15.5 12 15.5ZM19.43 12.98C19.47 12.66 19.5 12.34 19.5 12C19.5 11.66 19.47 11.34 19.43 11.02L21.54 9.37C21.73 9.22 21.78 8.95 21.66 8.73L19.66 5.27C19.54 5.05 19.27 4.97 19.05 5.05L16.56 6.05C16.04 5.65 15.48 5.32 14.87 5.07L14.49 2.42C14.46 2.18 14.25 2 14 2H10C9.75 2 9.54 2.18 9.51 2.42L9.13 5.07C8.52 5.32 7.96 5.66 7.44 6.05L4.95 5.05C4.73 4.97 4.46 5.05 4.34 5.27L2.34 8.73C2.21 8.95 2.27 9.22 2.46 9.37L4.57 11.02C4.53 11.34 4.5 11.67 4.5 12C4.5 12.33 4.53 12.66 4.57 12.98L2.46 14.63C2.27 14.78 2.22 15.05 2.34 15.27L4.34 18.73C4.46 18.95 4.73 19.03 4.95 18.95L7.44 17.95C7.96 18.34 8.52 18.68 9.13 18.93L9.51 21.58C9.54 21.82 9.75 22 10 22H14C14.25 22 14.46 21.82 14.49 21.58L14.87 18.93C15.48 18.67 16.04 18.34 16.56 17.95L19.05 18.95C19.27 19.03 19.54 18.95 19.66 18.73L21.66 15.27C21.78 15.05 21.73 14.78 21.54 14.63L19.43 12.98Z"/>
            </svg>
        </button>
    </div>

    <div class="main-content">
        <div class="input-group">
            <input type="text" id="vpn-key" placeholder="Ключ доступа">
            <div class="hint">Вставьте ваш ключ после оплаты</div>
        </div>
    </div>

    <div class="footer">
        <button class="buy-button" onclick="buyAction()">Купить подписку</button>
    </div>

    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-title">Настройки</div>
            
            <div class="setting-item">
                <span class="setting-label">Язык приложения</span>
                <select class="lang-select" id="langSelect" onchange="changeLanguage()">
                    <option value="ru">Русский</option>
                    <option value="en">English</option>
                </select>
            </div>

            <div class="setting-item">
                <span class="setting-label">Нужна помощь?</span>
                <button class="support-btn" onclick="openSupport()">Написать в поддержку</button>
            </div>

            <button class="close-modal" onclick="toggleModal(false)">Закрыть</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#000000');

        function toggleModal(show) {
            document.getElementById('settingsModal').style.display = show ? 'flex' : 'none';
        }

        function changeLanguage() {
            const lang = document.getElementById('langSelect').value;
            tg.showAlert("Язык изменен на: " + (lang === 'ru' ? 'Русский' : 'English'));
            // Здесь должна быть логика смены текста на странице
        }

        function openSupport() {
            // Замените на вашу ссылку на бота или аккаунт поддержки
            tg.openTelegramLink("https://t.me/your_support_username");
        }

        function buyAction() {
            tg.HapticFeedback.impactOccurred('medium');
            tg.showConfirm("Оформить подписку?");
        }
    </script>
</body>
</html>
